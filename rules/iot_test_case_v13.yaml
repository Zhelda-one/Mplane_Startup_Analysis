- id: 6.2.6.3 SSH/TLS Secure connection establishment
  description: "SSH session/TLS connection establishment initiated by O-DU "
  severity: INFO
  any_pattern:
    - '(?i)Authentication successful'
    - 'User\s+"[^"]+"\s+authenticated\.'
    - '(?i)SSH channel established'
  collect:
   mode: "regex"      # regex | boundary | message-id
   before: 5
   after:  2
   max_block_lines: 80
   max_evidence: 5  
 
  extra: { category: "NETCONF" }

- id: 6.2.6.4-1 NETCONF Capability discovery
  description: "NETCONF hello exchange between O-RU and O-DU"
  severity: INFO
  all_pattern:
    - '(?i)<\s*hello[^>]*urn:ietf:params:xml:ns:netconf:base'
  collect:
   mode: "regex"      # regex | boundary | message-id
   before: 0
   after:  5
   max_block_lines: 80
   max_evidence: 1
  extra: { category: "NETCONF" }

- id: 6.2.6.4-2 NETCONF Capability discovery(Capabilities inform)
  description: "O-RU sends yang-library of ietf-yang-library.yang module"
  severity: INFO
  any_pattern:
    - "<\\s*(?:\\w+:)?rpc\\b[^>]*\\bmessage-id\\s*=\\s*([\"'])\\s*\\d+\\s*\\1[^>]*>"
    - "<\\s*(?:\\w+:)?rpc-reply\\b[^>]*\\bmessage-id\\s*=\\s*([\"'])\\s*\\d+\\s*\\1[^>]*>\\s*<\\s*(?:\\w+:)?data\\b"
    - '(?i)<modules-state xmlns="urn:ietf:params:xml:ns:yang:ietf-yang-library">'
  collect:
   mode: "regex"      # regex | boundary | message-id
   before: 0
   after:  40
   max_block_lines: 300
   max_evidence: 1
  extra: { category: "MODULE" }


- id: 6.2.6.6  Initial process of NETCONF Subscribe
  description: "NETCONF create sbscription O-DU to O-RU"
  severity: INFO
  any_pattern:
    - '(?i)create-subscription'
  collect:
   mode: "regex"      # regex | boundary | message-id
   before: 2
   after:  7
   max_block_lines: 80
   max_evidence: 1
  extra: { category: "NETCONF" }

- id: 6.2.6.7  Supervision of NETCONF connection
  description: "O-RU sends supervision notification to O-DU"
  severity: INFO
  all_pattern:
    - '(?i)supervision-notification|supervision-watchdog-reset'
  collect:
   mode: "regex"      # regex | boundary | message-id
   before: 2
   after: 8
   max_block_lines: 80
   max_evidence: 1
  extra: { category: "NETCONF" }

- id: 6.2.6.8  Retrieval of O-RU information and Additional configuration
  description: "O-RU sends each yang module list in ietf-yang-library.yang "
  severity: INFO
  all_pattern:
    - '(?i)ietf-interfaces|o-ran-operations|o-ran-lbm|o-ran-performance-management'
    - '(?i)o-ran-transceiver|o-ran-sync|o-ran-mplane-int|o-ran-delay-management|o-ran-module-cap'
    - '(?i)o-ran-alarm-id|o-ran-fan|o-ran-supervision|o-ran-user-mgmt'
  collect:
   mode: "regex"      # regex | boundary | message-id
   before: 3
   after: 3
   max_block_lines: 80
   max_evidence: 40
  extra: { category: "NETCONF" }
# -----------------------------
# 6.2.6.8 Sub rules (1~15)
# -----------------------------

- id: 6.2.6.8-1 HW info
  description: "Retrieves O-RU hardware information from O-RU"
  severity: INFO
  any_pattern:
    - '(?i)product-code'
    - '(?i)o-ran-name'
  collect:
    mode: "message-id"
    before: 2
    after: 8
    max_block_lines: 120
    max_evidence: 3
  extra: { category: "NETCONF", parent: "6.2.6.8", no_fail: true,  no_judge: true }

- id: 6.2.6.8-2 Interfaces
  description: "Retrieval of O-RU interface information from O-RU"
  severity: INFO
  any_pattern:
    # 1. <interfaces> 태그 시작 (namespace 포함)
    # - '(?s)<\s*interfaces\s+xmlns\s*=\s*"urn:ietf:params:xml:ns:yang:ietf-interfaces"'
    # 2. <interface/> self-closing 태그 (들여쓰기 무시)
    # - '(?s)<\s*interface\s*/\s*>'
    # 3. </interfaces> 종료 태그
    - '(?s)</\s*interfaces\s*>'
  collect:
    mode: "regex"
    before: 2
    after: 20
    max_block_lines: 120
    max_evidence: 1
  extra: { category: "NETCONF", parent: "6.2.6.8", no_fail: true,  no_judge: true }

- id: 6.2.6.8-3 Port transceivers
